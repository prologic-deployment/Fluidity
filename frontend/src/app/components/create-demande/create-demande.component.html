<div class="min-h-screen bg-slate-100">
  <header class="bg-white shadow">
    <div class="max-w-3xl mx-auto px-4 py-4">
      <a routerLink="/demandes" class="text-blue-600 text-sm hover:underline">&larr; Retour</a>
      <h1 class="text-xl font-bold text-slate-800 mt-1">Nouvelle Demande</h1>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-6">
    <form [formGroup]="form" (ngSubmit)="submit()"
      class="bg-white shadow rounded-lg p-6 space-y-5">

      <p *ngIf="error" class="text-red-600 bg-red-50 border border-red-200 rounded-md px-4 py-2 text-sm">{{ error }}</p>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Identifiant client</label>
          <input formControlName="clientId" type="text"
            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <p *ngIf="form.get('clientId')?.invalid && form.get('clientId')?.touched"
            class="text-red-500 text-xs mt-1">Champ requis.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Objet</label>
          <input formControlName="objet" type="text"
            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <p *ngIf="form.get('objet')?.invalid && form.get('objet')?.touched"
            class="text-red-500 text-xs mt-1">Champ requis.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Type de demande</label>
          <input formControlName="typeDemande" type="text"
            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <p *ngIf="form.get('typeDemande')?.invalid && form.get('typeDemande')?.touched"
            class="text-red-500 text-xs mt-1">Champ requis.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Service / Environnement</label>
          <input formControlName="serviceEnvironnement" type="text"
            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <p *ngIf="form.get('serviceEnvironnement')?.invalid && form.get('serviceEnvironnement')?.touched"
            class="text-red-500 text-xs mt-1">Champ requis.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Catégorie</label>
          <select formControlName="categorie" (change)="onCategorieChange()"
            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
            <option value="" disabled>Sélectionner...</option>
            <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
          </select>
          <p *ngIf="form.get('categorie')?.invalid && form.get('categorie')?.touched"
            class="text-red-500 text-xs mt-1">Champ requis.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Sous-catégorie</label>
          <select formControlName="sousCategorie"
            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
            <option value="" disabled>Sélectionner...</option>
            <option *ngFor="let sc of sousCategories" [value]="sc">{{ sc }}</option>
          </select>
          <p *ngIf="form.get('sousCategorie')?.invalid && form.get('sousCategorie')?.touched"
            class="text-red-500 text-xs mt-1">Champ requis.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Priorité souhaitée</label>
          <select formControlName="prioriteSouhaitee"
            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
            <option *ngFor="let p of priorites" [value]="p">{{ p }}</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Contrat</label>
          <input formControlName="contrat" type="text"
            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <p *ngIf="form.get('contrat')?.invalid && form.get('contrat')?.touched"
            class="text-red-500 text-xs mt-1">Champ requis.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Date souhaitée de réalisation</label>
          <input formControlName="dateSouhaiteeRealisation" type="date"
            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Description détaillée</label>
        <textarea formControlName="descriptionDetaillee" rows="4"
          class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Décrivez votre besoin (minimum 10 caractères)"></textarea>
        <p *ngIf="form.get('descriptionDetaillee')?.invalid && form.get('descriptionDetaillee')?.touched"
          class="text-red-500 text-xs mt-1">Description requise (min. 10 caractères).</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Informations complémentaires</label>
        <textarea formControlName="informationsComplementaires" rows="2"
          class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Pièces jointes (URLs, séparées par des virgules)</label>
        <input formControlName="piecesJointes" type="text"
          class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="https://..., https://..." />
      </div>

      <div class="flex justify-end space-x-3 pt-2">
        <button type="button" routerLink="/demandes"
          class="px-4 py-2 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50">Annuler</button>
        <button type="submit" [disabled]="loading"
          class="px-4 py-2 rounded-md bg-blue-600 text-white font-medium hover:bg-blue-700 disabled:opacity-50">
          {{ loading ? 'Envoi...' : 'Soumettre la demande' }}
        </button>
      </div>
    </form>
  </main>
</div>
