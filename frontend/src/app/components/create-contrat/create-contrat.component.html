<div class="min-h-screen">
  <header class="border-b border-border bg-card/60 backdrop-blur">
    <div class="max-w-2xl mx-auto px-6 py-5">
      <a routerLink="/contrats" class="btn-link">&larr; Retour aux contrats</a>
      <h1 class="text-xl font-semibold tracking-tight mt-1">Ouvrir un contrat</h1>
      <p class="text-sm text-muted-foreground">Réservé aux administrateurs — associe un contrat à un client.</p>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-6 py-8">
    <form [formGroup]="form" (ngSubmit)="submit()" class="card animate-fade-in-up">
      <div class="card-content pt-6 space-y-5">

        <p *ngIf="error" class="alert-destructive">{{ error }}</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="field-label">Identifiant client</label>
            <input formControlName="clientId" type="text" class="input" placeholder="ex: client@fluidity.dev" />
            <p *ngIf="form.get('clientId')?.invalid && form.get('clientId')?.touched" class="field-error">Champ requis.</p>
          </div>
          <div>
            <label class="field-label">Référence</label>
            <input formControlName="reference" type="text" class="input" placeholder="ex: CTR-2026-003" />
            <p *ngIf="form.get('reference')?.invalid && form.get('reference')?.touched" class="field-error">Champ requis.</p>
          </div>
          <div class="md:col-span-2">
            <label class="field-label">Intitulé</label>
            <input formControlName="intitule" type="text" class="input" />
            <p *ngIf="form.get('intitule')?.invalid && form.get('intitule')?.touched" class="field-error">Champ requis.</p>
          </div>
          <div>
            <label class="field-label">Type de contrat</label>
            <select formControlName="typeContrat" class="select">
              <option *ngFor="let t of types" [value]="t">{{ t }}</option>
            </select>
          </div>
          <div>
            <label class="field-label">Statut</label>
            <select formControlName="statut" class="select">
              <option *ngFor="let s of statuts" [value]="s">{{ s }}</option>
            </select>
          </div>
          <div>
            <label class="field-label">Date de début</label>
            <input formControlName="dateDebut" type="date" class="input" />
            <p *ngIf="form.get('dateDebut')?.invalid && form.get('dateDebut')?.touched" class="field-error">Champ requis.</p>
          </div>
          <div>
            <label class="field-label">Date de fin (optionnelle)</label>
            <input formControlName="dateFin" type="date" class="input" />
          </div>
        </div>

        <div>
          <label class="field-label">Description</label>
          <textarea formControlName="description" rows="3" class="textarea"></textarea>
        </div>

        <div class="flex justify-end space-x-3 pt-4 border-t border-border">
          <a routerLink="/contrats" class="btn-outline">Annuler</a>
          <button type="submit" [disabled]="loading" class="btn-primary">
            {{ loading ? 'Ouverture...' : 'Ouvrir le contrat' }}
          </button>
        </div>
      </div>
    </form>
  </main>
</div>
