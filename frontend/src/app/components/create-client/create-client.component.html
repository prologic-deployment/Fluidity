<div class="min-h-screen">
  <header class="border-b border-border bg-card/60 backdrop-blur sticky top-0 z-10">
    <div class="max-w-2xl mx-auto px-6 py-5">
      <a routerLink="/clients" class="btn-link">&larr; Retour aux clients</a>
      <h1 class="text-xl font-semibold tracking-tight mt-1">Nouveau client</h1>
      <p class="text-sm text-muted-foreground">Réservé aux administrateurs — préalable à l'ouverture d'un contrat.</p>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-6 py-8">
    <form [formGroup]="form" (ngSubmit)="submit()" class="card animate-fade-in-up">
      <div class="card-header-tinted">
        <div class="form-section-header">
          <div class="form-section-icon">
            <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </div>
          <div>
            <h2 class="card-title">Informations du client</h2>
            <p class="card-description">L'email doit correspondre au compte utilisateur (rôle CLIENT) de ce client.</p>
          </div>
        </div>
      </div>

      <div class="card-content pt-6 space-y-5">
        <p *ngIf="error" class="alert-destructive">{{ error }}</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="field-label">Nom / Raison sociale</label>
            <input formControlName="nom" type="text" class="input" placeholder="ex: Atlas Industries" />
            <p *ngIf="form.get('nom')?.invalid && form.get('nom')?.touched" class="field-error">Champ requis.</p>
          </div>
          <div>
            <label class="field-label">Email</label>
            <input formControlName="email" type="email" class="input" placeholder="ex: client@entreprise.com" />
            <p *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="field-error">Email valide requis.</p>
          </div>
          <div>
            <label class="field-label">Téléphone</label>
            <input formControlName="telephone" type="text" class="input" />
          </div>
          <div>
            <label class="field-label">Statut</label>
            <select formControlName="statut" class="select">
              <option *ngFor="let s of statuts" [value]="s">{{ s }}</option>
            </select>
          </div>
          <div class="md:col-span-2">
            <label class="field-label">Adresse</label>
            <input formControlName="adresse" type="text" class="input" />
          </div>
        </div>

        <div>
          <label class="field-label">Notes</label>
          <textarea formControlName="notes" rows="3" class="textarea"></textarea>
        </div>

        <div class="flex justify-end space-x-3 pt-4 border-t border-border">
          <a routerLink="/clients" class="btn-outline">Annuler</a>
          <button type="submit" [disabled]="loading" class="btn-primary">
            {{ loading ? 'Création...' : 'Créer le client' }}
          </button>
        </div>
      </div>
    </form>
  </main>
</div>
