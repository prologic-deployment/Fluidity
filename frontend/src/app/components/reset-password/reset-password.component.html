<div class="min-h-screen flex items-center justify-center bg-muted/30 px-4">
  <div class="w-full max-w-md card">
    <div class="card-header text-center">
      <div class="mx-auto mb-2 flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-primary-foreground font-bold">F</div>
      <h1 class="card-title text-2xl">Fluidity</h1>
      <p class="card-description">Réinitialisation du mot de passe</p>
    </div>

    <div class="card-content">
      <!-- Mode : demande du lien (pas de token) -->
      <form *ngIf="!token" [formGroup]="forgotForm" (ngSubmit)="sendForgot()" class="space-y-4">
        <div>
          <label class="field-label">Email</label>
          <input type="email" formControlName="email" class="input" />
          <p *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched" class="field-error">
            Email valide requis.
          </p>
        </div>
        <button type="submit" [disabled]="loading" class="btn-primary w-full">
          {{ loading ? 'Envoi...' : 'Envoyer le lien' }}
        </button>
      </form>

      <!-- Mode : saisie du nouveau mot de passe (avec token) -->
      <form *ngIf="token" [formGroup]="resetForm" (ngSubmit)="sendReset()" class="space-y-4">
        <div>
          <label class="field-label">Nouveau mot de passe</label>
          <input type="password" formControlName="password" class="input" placeholder="Minimum 6 caractères" />
          <p *ngIf="resetForm.get('password')?.invalid && resetForm.get('password')?.touched" class="field-error">
            Minimum 6 caractères.
          </p>
        </div>
        <button type="submit" [disabled]="loading" class="btn-primary w-full">
          {{ loading ? 'Enregistrement...' : 'Réinitialiser' }}
        </button>
      </form>

      <p *ngIf="message" class="alert-success mt-4">{{ message }}</p>
      <p *ngIf="error" class="alert-destructive mt-4">{{ error }}</p>

      <div class="mt-5 text-center">
        <a routerLink="/login" class="btn-link">Retour à la connexion</a>
      </div>
    </div>
  </div>
</div>
