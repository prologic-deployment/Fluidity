<div class="min-h-screen flex items-center justify-center bg-slate-100 px-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
    <h1 class="text-2xl font-bold text-slate-800 mb-1 text-center">Fluidity</h1>
    <p class="text-center text-slate-500 mb-6">Réinitialisation du mot de passe</p>

    <!-- Mode : demande du lien (pas de token) -->
    <form *ngIf="!token" [formGroup]="forgotForm" (ngSubmit)="sendForgot()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" formControlName="email"
          class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <p *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched"
          class="text-red-500 text-xs mt-1">Email valide requis.</p>
      </div>
      <button type="submit" [disabled]="loading"
        class="w-full bg-blue-600 text-white py-2 rounded-md font-medium hover:bg-blue-700 disabled:opacity-50">
        {{ loading ? 'Envoi...' : 'Envoyer le lien' }}
      </button>
    </form>

    <!-- Mode : saisie du nouveau mot de passe (avec token) -->
    <form *ngIf="token" [formGroup]="resetForm" (ngSubmit)="sendReset()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nouveau mot de passe</label>
        <input type="password" formControlName="password"
          class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Minimum 6 caractères" />
        <p *ngIf="resetForm.get('password')?.invalid && resetForm.get('password')?.touched"
          class="text-red-500 text-xs mt-1">Minimum 6 caractères.</p>
      </div>
      <button type="submit" [disabled]="loading"
        class="w-full bg-blue-600 text-white py-2 rounded-md font-medium hover:bg-blue-700 disabled:opacity-50">
        {{ loading ? 'Enregistrement...' : 'Réinitialiser' }}
      </button>
    </form>

    <p *ngIf="message" class="mt-4 text-green-600 text-sm text-center">{{ message }}</p>
    <p *ngIf="error" class="mt-4 text-red-500 text-sm text-center">{{ error }}</p>

    <div class="mt-4 text-center">
      <a routerLink="/login" class="text-sm text-blue-600 hover:underline">Retour à la connexion</a>
    </div>
  </div>
</div>
