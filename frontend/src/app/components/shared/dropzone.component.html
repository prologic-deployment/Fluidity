<div
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  (click)="fileInput.click()"
  [class.border-primary]="isDragOver"
  [class.bg-primary]="isDragOver"
  class="relative flex flex-col items-center justify-center gap-2 rounded-xl border-2 border-dashed border-input
    px-6 py-8 text-center cursor-pointer transition-all duration-150 hover:border-primary/50 hover:bg-accent/40"
  [ngClass]="{ 'border-primary bg-accent/60 scale-[1.01]': isDragOver }">

  <input #fileInput type="file" class="hidden" [attr.accept]="accept || null" [attr.multiple]="multiple ? '' : null" (change)="onFileInputChange($event)" />

  <div class="flex h-11 w-11 items-center justify-center rounded-full bg-gradient-to-br from-primary/15 to-violet-500/15 text-primary">
    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 14.5A3.5 3.5 0 0 1 7.5 11h.5a5 5 0 0 1 9.9-1H18a3 3 0 1 1 0 6H7a3 3 0 0 1-3-3.5Z"></path>
      <path d="M12 12v7"></path>
      <path d="m9 15 3-3 3 3"></path>
    </svg>
  </div>

  <p class="text-sm font-medium text-foreground">{{ label }}</p>
  <p class="text-xs text-muted-foreground">{{ hint }}</p>
</div>

<div *ngIf="items.length" class="mt-3 space-y-2">
  <div *ngFor="let item of items"
    class="flex items-center gap-3 rounded-lg border border-border bg-card px-3 py-2.5 animate-fade-in">

    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-md"
      [ngClass]="{
        'bg-primary/10 text-primary': item.status === 'uploading',
        'bg-success/10 text-success': item.status === 'done',
        'bg-destructive/10 text-destructive': item.status === 'error'
      }">
      <svg *ngIf="item.status === 'uploading'" class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
      </svg>
      <svg *ngIf="item.status === 'done'" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <path d="M14 2v6h6"></path>
      </svg>
      <svg *ngIf="item.status === 'error'" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    </div>

    <div class="min-w-0 flex-1">
      <p class="truncate text-sm font-medium text-foreground">{{ item.name }}</p>
      <p class="text-xs text-muted-foreground">
        {{ formatSize(item.size) }}
        <span *ngIf="item.status === 'uploading'"> — envoi en cours...</span>
        <span *ngIf="item.status === 'error'" class="text-destructive"> — {{ item.errorMsg }}</span>
      </p>
    </div>

    <button type="button" (click)="remove(item.id); $event.stopPropagation()" title="Retirer"
      class="btn-icon-sm shrink-0 text-muted-foreground hover:bg-destructive/10 hover:text-destructive">
      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
    </button>
  </div>
</div>
