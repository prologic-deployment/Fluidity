<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
  <div class="absolute inset-0 bg-slate-950/60 backdrop-blur-sm animate-fade-in" (click)="close()"></div>

  <div class="relative w-full max-w-lg max-h-[85vh] flex flex-col overflow-hidden rounded-xl border border-border bg-card text-card-foreground shadow-2xl animate-scale-in">
    <div class="h-1 bg-gradient-to-r from-indigo-500 via-violet-500 to-indigo-500 shrink-0"></div>
    <div class="flex items-start justify-between gap-4 border-b border-border px-6 py-4">
      <div class="min-w-0">
        <h2 class="text-base font-semibold tracking-tight truncate">{{ title }}</h2>
        <p *ngIf="subtitle" class="text-xs text-muted-foreground mt-0.5 truncate">{{ subtitle }}</p>
      </div>
      <button (click)="close()" title="Fermer"
        class="shrink-0 flex h-8 w-8 items-center justify-center rounded-md text-muted-foreground transition-colors hover:bg-accent hover:text-accent-foreground">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 6 6 18"></path>
          <path d="M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div class="overflow-y-auto px-6 py-5">
      <ng-content></ng-content>
    </div>
  </div>
</div>
