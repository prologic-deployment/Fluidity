<div class="min-h-screen bg-muted/30">
  <header class="border-b border-border bg-card">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <a routerLink="/changements" class="btn-link">&larr; Retour</a>
      <h1 class="text-xl font-semibold tracking-tight">Nouveau Changement</h1>
      <span></span>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">

      <p *ngIf="error" class="alert-destructive">{{ error }}</p>

      <!-- Section 1 : Informations générales -->
      <section class="card">
        <div class="card-header">
          <h2 class="card-title">Informations générales</h2>
        </div>
        <div class="card-content pt-0 space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="field-label">Identifiant client</label>
              <input formControlName="clientId" type="text" class="input" />
              <p *ngIf="form.get('clientId')?.invalid && form.get('clientId')?.touched" class="field-error">Champ requis.</p>
            </div>
            <div>
              <label class="field-label">Objet du changement</label>
              <input formControlName="objetChangement" type="text" class="input" />
              <p *ngIf="form.get('objetChangement')?.invalid && form.get('objetChangement')?.touched" class="field-error">Champ requis.</p>
            </div>
            <div>
              <label class="field-label">Service / Environnement</label>
              <input formControlName="serviceEnvironnement" type="text" class="input" />
            </div>
            <div>
              <label class="field-label">Type de changement</label>
              <select formControlName="typeChangement" class="select">
                <option *ngFor="let t of typesChangement" [value]="t">{{ t }}</option>
              </select>
            </div>
            <div>
              <label class="field-label">Catégorie</label>
              <select formControlName="categorie" (change)="onCategorieChange()" class="select">
                <option value="" disabled>Sélectionner...</option>
                <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
              </select>
            </div>
            <div>
              <label class="field-label">Sous-catégorie</label>
              <select formControlName="sousCategorie" class="select">
                <option value="" disabled>Sélectionner...</option>
                <option *ngFor="let sc of sousCategories" [value]="sc">{{ sc }}</option>
              </select>
            </div>
            <div>
              <label class="field-label">Fenêtre d'intervention</label>
              <input formControlName="fenetreIntervention" type="datetime-local" class="input" />
              <p *ngIf="form.get('fenetreIntervention')?.invalid && form.get('fenetreIntervention')?.touched" class="field-error">Champ requis.</p>
            </div>
            <div>
              <label class="field-label">Prérequis nécessaires</label>
              <input formControlName="prerequisNecessaires" type="text" class="input" />
            </div>
          </div>
          <div>
            <label class="field-label">Description détaillée</label>
            <textarea formControlName="descriptionDetaillee" rows="4" class="textarea"
              placeholder="Décrivez le changement (minimum 10 caractères)"></textarea>
            <p *ngIf="form.get('descriptionDetaillee')?.invalid && form.get('descriptionDetaillee')?.touched" class="field-error">
              Description requise (min. 10 caractères).
            </p>
          </div>
          <div>
            <label class="field-label">Plan de retour arrière</label>
            <textarea formControlName="planRetourArriere" rows="3" class="textarea"></textarea>
            <p *ngIf="form.get('planRetourArriere')?.invalid && form.get('planRetourArriere')?.touched" class="field-error">Champ requis.</p>
          </div>
        </div>
      </section>

      <!-- Section 2 : Spécifications générales -->
      <section class="card" formGroupName="general">
        <div class="card-header">
          <h2 class="card-title">Spécifications — Général</h2>
        </div>
        <div class="card-content pt-0">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="field-label">Ressources concernées</label>
              <input formControlName="ressourcesConcernees" type="text" class="input" />
            </div>
            <div>
              <label class="field-label">Environnement</label>
              <input formControlName="environnement" type="text" class="input" />
            </div>
            <div class="md:col-span-2">
              <label class="field-label">Commentaire</label>
              <textarea formControlName="commentaire" rows="2" class="textarea"></textarea>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 3 : Serveur -->
      <section class="card" formGroupName="serveur">
        <div class="card-header">
          <h2 class="card-title">Spécifications — Serveur</h2>
        </div>
        <div class="card-content pt-0">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="field-label">Système d'exploitation</label>
              <input formControlName="os" type="text" class="input" />
            </div>
            <div>
              <label class="field-label">Cœurs CPU</label>
              <input formControlName="cpuCores" type="number" min="0" class="input" />
            </div>
            <div>
              <label class="field-label">RAM (Go)</label>
              <input formControlName="ramGo" type="number" min="0" class="input" />
            </div>
            <div>
              <label class="field-label">Disque NVMe (Go)</label>
              <input formControlName="disqueNvmeGo" type="number" min="0" class="input" />
            </div>
            <div>
              <label class="field-label">Disque SAS (Go)</label>
              <input formControlName="disqueSasGo" type="number" min="0" class="input" />
            </div>
          </div>
        </div>
      </section>

      <!-- Section 4 : Réseau -->
      <section class="card" formGroupName="reseau">
        <div class="card-header">
          <h2 class="card-title">Spécifications — Réseau</h2>
        </div>
        <div class="card-content pt-0">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="field-label">VLAN</label>
              <input formControlName="vlan" type="text" class="input" />
            </div>
            <div>
              <label class="field-label">Adresse IP</label>
              <input formControlName="adresseIp" type="text" class="input" />
            </div>
            <div>
              <label class="field-label">Masque de sous-réseau</label>
              <input formControlName="masqueSousReseau" type="text" class="input" />
            </div>
            <div>
              <label class="field-label">Passerelle</label>
              <input formControlName="passerelle" type="text" class="input" />
            </div>
          </div>
        </div>
      </section>

      <!-- Section 5 : Sauvegarde -->
      <section class="card" formGroupName="backup">
        <div class="card-header">
          <h2 class="card-title">Spécifications — Sauvegarde</h2>
        </div>
        <div class="card-content pt-0">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="field-label">Espace backup sup. (Go)</label>
              <input formControlName="espaceBackupSupplementaireGo" type="number" min="0" class="input" />
            </div>
            <div>
              <label class="field-label">Rétention souhaitée</label>
              <input formControlName="retentionSouhaitee" type="text" class="input" />
            </div>
            <div class="md:col-span-2">
              <label class="field-label">Licences nécessaires</label>
              <input formControlName="licencesNecessaires" type="text" class="input" />
            </div>
          </div>
        </div>
      </section>

      <div class="flex justify-end space-x-3">
        <a routerLink="/changements" class="btn-outline">Annuler</a>
        <button type="submit" [disabled]="loading" class="btn-primary">
          {{ loading ? 'Envoi...' : 'Soumettre le changement' }}
        </button>
      </div>
    </form>
  </main>
</div>
