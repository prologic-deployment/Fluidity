<div class="min-h-screen flex items-center justify-center bg-slate-100 px-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
    <h1 class="text-2xl font-bold text-slate-800 mb-1 text-center">Fluidity</h1>
    <p class="text-center text-slate-500 mb-6">Connexion au portail de services</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" formControlName="email"
          class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="utilisateur@entreprise.com" />
        <p *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
          class="text-red-500 text-xs mt-1">Email valide requis.</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
        <input type="password" formControlName="password"
          class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <p *ngIf="error" class="text-red-500 text-sm">{{ error }}</p>

      <button type="submit" [disabled]="loading"
        class="w-full bg-blue-600 text-white py-2 rounded-md font-medium hover:bg-blue-700 disabled:opacity-50">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <div class="mt-4 text-center">
      <a routerLink="/reset-password" class="text-sm text-blue-600 hover:underline">
        Mot de passe oublié ?
      </a>
    </div>
  </div>
</div>
