<div class="min-h-screen flex items-center justify-center bg-muted/30 px-4">
  <div class="w-full max-w-md card">
    <div class="card-header text-center">
      <div class="mx-auto mb-2 flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-primary-foreground font-bold">F</div>
      <h1 class="card-title text-2xl">Fluidity</h1>
      <p class="card-description">Connexion au portail de services</p>
    </div>

    <div class="card-content">
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div>
          <label class="field-label">Email</label>
          <input type="email" formControlName="email" class="input" placeholder="utilisateur@entreprise.com" />
          <p *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="field-error">
            Email valide requis.
          </p>
        </div>

        <div>
          <label class="field-label">Mot de passe</label>
          <input type="password" formControlName="password" class="input" placeholder="••••••••" />
        </div>

        <p *ngIf="error" class="alert-destructive">{{ error }}</p>

        <button type="submit" [disabled]="loading" class="btn-primary w-full">
          {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>
      </form>

      <div class="mt-5 text-center">
        <a routerLink="/reset-password" class="btn-link">Mot de passe oublié ?</a>
      </div>
    </div>
  </div>
</div>
